spring.config.import=optional:file:.env[.properties]
spring.application.name=healthcare

server.error.include-stacktrace=never
server.error.include-exception=false

gemini.api-key=${GEMINI_API_KEY}
gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-lite-latest:generateContent

spring.datasource.url=${SUPABASE_JDBC_URL:jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres.qpwxncugdsmjmbxdqsbo}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=20

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.nom=${APP_ADMIN_NOM}
app.admin.prenom=${APP_ADMIN_PRENOM}
app.admin.telephone=${APP_ADMIN_TELEPHONE}
app.admin.adresse=${APP_ADMIN_ADRESSE}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:60}
app.mail.from=${MAIL_FROM:noreply@curalink.local}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.services.catalog.supabase-url=${SUPABASE_URL:}
app.services.catalog.bucket=${SUPABASE_STORAGE_BUCKET}
app.services.catalog.api-key=${SUPABASE_SERVICE_ROLE_KEY}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB