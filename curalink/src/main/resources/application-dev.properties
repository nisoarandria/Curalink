spring.datasource.url=jdbc:h2:mem:curalink-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never

# In dev, keep service illustrations as direct public image URLs.
app.services.catalog.supabase-url=
app.services.catalog.bucket=
app.services.catalog.api-key=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
